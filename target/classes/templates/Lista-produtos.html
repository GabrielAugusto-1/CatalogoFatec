<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security>">
<head>
    <meta charset="UTF-8">
    <title>Lista de Produtos</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            font-family: 'Poppins', sans-serif;
            color: #eaeaea;
        }

        .card-dark {
            background-color: #1e1e1e;
            border: none;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .table-dark-custom {
            --bs-table-bg: #1e1e1e;
            --bs-table-striped-bg: #181818;
            --bs-table-hover-bg: #2a2a2a;
        }

        .gold-text {
            color: #c9a227;
        }

        .btn-gold {
            background-color: #c9a227;
            border: none;
            color: black;
            font-weight: 500;
        }

        .btn-gold:hover {
            background-color: #e6c75a;
        }
        .caros{
    color: #ff4d4d;
    font-weight: bold;
}
        .table .caros {
    color: #ff4d4d;
    font-weight: bold;
}
        .navbar .nav-link:hover {
    color: #c9a227 !important;
}

.navbar-brand {
    letter-spacing: 1px;
}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background-color: #121212; border-bottom: 1px solid #2a2a2a;">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand gold-text fw-bold" href="/produtos">
            🜃 LOTM System
        </a>

        <!-- BOTÃO MOBILE -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- LINKS -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav me-auto">

                <!-- PRODUTOS -->
                <li class="nav-item">
                    <a class="nav-link text-light" href="/produtos">📦 Produtos</a>
                </li>

                <!-- USUÁRIOS -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-light" href="/novo-usuario">👤 Novo Usuários</a>
                </li>

            </ul>

            <!-- DIREITA -->
            <div class="d-flex gap-2">

                <!-- ADMIN -->
                <a sec:authorize="hasRole('ADMIN')"
                   href="/produtos/novo"
                   class="btn btn-gold btn-sm">
                    + Produto
                </a>

                <!-- LOGOUT -->
                <a href="/login" class="btn btn-outline-light btn-sm">
                    Sair
                </a>

            </div>

        </div>
    </div>
</nav>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4" >
        <a></a>
        <h2 class="gold-text fw-semibold">Lista de Produtos</h2>
        <a sec:authorize="hasRole('ADMIN')" href="/produtos/novo" class="btn btn-gold">+ Novo Produto</a>
        <a sec:authorize="hasRole('USER')"></a>
    </div>

    <form action="/produtos" method="get" class="mb-3 d-flex gap-2">
        <input type="text" name="nome" placeholder="Buscar produto"
               th:value="${busca}" class="form-control"/>
        <button type="submit" class="btn btn-gold">Buscar</button>
    </form>

    <!-- Mensagem caso não encontre nada -->
    <div th:if="${#lists.isEmpty(produtos)}" class="text-center my-3">
        Nenhum produto encontrado.
    </div>
    <div class="card card-dark p-4">
        <div class="table-responsive">
            <table class="table table-dark table-striped table-hover table-dark-custom align-middle text-center">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Valor</th>
                    <th>Data</th>
                    <th sec:authorize="hasRole('ADMIN')">Ações</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="produto : ${produtos}">

                    <td th:text="${produto.idProduto}"></td>
                    <td th:text="${produto.nome}"></td>
                    <td
                            th:text="'R$ ' + ${#numbers.formatDecimal(produto.valor, 1, 'POINT', 2, 'COMMA')}"
                            th:classappend="${produto.valor.doubleValue() > 1000} ? 'caros' : ''">
                    </td>
                    <td th:text="${#temporals.format(produto.dataCadastro, 'dd/MM/yyyy HH:mm')}"></td>

                    <td sec:authorize="hasRole('ADMIN')">
                        <a class="btn btn-sm btn-gold"
                           th:href="@{/produtos/editar/{id}(id=${produto.idProduto})}">
                            Editar
                        </a>

                        <a class="btn btn-sm btn-gold"
                           th:href="@{/produtos/excluir/{id}(id=${produto.idProduto})}">
                            🗑️
                        </a>
                    </td>

                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
