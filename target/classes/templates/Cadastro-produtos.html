<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Produto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            font-family: 'Poppins', sans-serif;
            color: #eaeaea;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card-dark {
            background-color: #1e1e1e;
            border: none;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .gold-text {
            color: #c9a227;
        }

        .btn-gold {
            background-color: #c9a227;
            border: none;
            color: black;
            font-weight: 500;
        }

        .btn-gold:hover {
            background-color: #e6c75a;
        }

        .form-control {
            background-color: #2a2a2a;
            border: 1px solid #333;
            color: white;
        }

        .form-control:focus {
            background-color: #2a2a2a;
            color: white;
            border-color: #c9a227;
            box-shadow: 0 0 0 0.2rem rgba(201,162,39,0.25);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-dark p-4">
                <h3 class="text-center gold-text mb-4">Cadastrar Novo Produto</h3>

                <form th:action="@{/produtos/novo}" th:object="${produto}" method="post">

                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text"
                               name="nome"
                               id="nome"
                               class="form-control"
                               placeholder="Digite o nome do produto"
                               required
                               th:field="*{nome}">

                        <span th:if="${#fields.hasErrors('nome')}"
                              th:errors="*{nome}"></span>
                    </div>

                    <div class="mb-4">
                        <label for="valor" class="form-label">Valor</label>
                        <input type="number" step="0.01" name="valor" id="valor" class="form-control" placeholder="Digite o valor do produto"

                               th:field="*{valor}" >

                        <span th:if="${#fields.hasErrors('valor')}"
                              th:errors="*{valor}"></span>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/produtos" class="btn btn-outline-light">Cancelar</a>

                        <button type="submit" class="btn btn-gold">Salvar Produto</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
