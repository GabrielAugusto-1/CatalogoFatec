<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            font-family: 'Poppins', sans-serif;
            color: #eaeaea;
        }

        .card-dark {
            background-color: #1e1e1e;
            border: none;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .gold-text {
            color: #c9a227;
        }

        .btn-gold {
            background-color: #c9a227;
            border: none;
            color: black;
            font-weight: 500;
        }

        .btn-gold:hover {
            background-color: #e6c75a;
        }

        .form-control {
            background-color: #181818;
            border: 1px solid #2a2a2a;
            color: #fff;
        }

        .form-control:focus {
            background-color: #181818;
            color: #fff;
            border-color: #c9a227;
            box-shadow: 0 0 0 .2rem rgba(201,162,39,.25);
        }
    </style>
</head>
<body>

<div class="container py-5">

    <div class="mb-4">
        <h2 class="gold-text fw-semibold">Editar Produto</h2>
    </div>

    <div class="card card-dark p-4">
        <div th:if="${erro}" class="alert alert-danger text-center">
            <span th:text="${erro}"></span>
        </div>
        <form th:action="@{/produtos/editar/{id}(id=${produto.idProduto})}" th:object="${produto}" method="post">

            <input type="hidden" th:field="*{idProduto}"/>

            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control" th:field="*{nome}" required>

                <span class="text-danger small"
                      th:if="${#fields.hasErrors('nome')}"
                      th:errors="*{nome}">
    </span>
            </div>

            <div class="mb-4">
                <label class="form-label">Valor</label>
                <input type="number" step="0.01" class="form-control" th:field="*{valor}" required>

                <span class="text-danger small"
                      th:if="${#fields.hasErrors('valor')}"
                      th:errors="*{valor}">
    </span>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/produtos" class="btn btn-secondary">Voltar</a>
                <button type="submit" class="btn btn-gold">Salvar alterações</button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
