<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Usuário</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            font-family: 'Poppins', sans-serif;
            color: #eaeaea;
        }

        .card-dark {
            background-color: #1e1e1e;
            border: none;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .gold-text {
            color: #c9a227;
        }

        .btn-gold {
            background-color: #c9a227;
            border: none;
            color: black;
            font-weight: 500;
        }

        .btn-gold:hover {
            background-color: #e6c75a;
        }

        .form-control {
            background-color: #2a2a2a;
            border: 1px solid #333;
            color: white;
        }

        .form-control:focus {
            background-color: #2a2a2a;
            color: white;
            border-color: #c9a227;
            box-shadow: 0 0 0 0.2rem rgba(201,162,39,0.25);
        }
    </style>
</head>
<body>

<!-- HEADER (reaproveita o mesmo) -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background-color: #121212; border-bottom: 1px solid #2a2a2a;">
    <div class="container">
        <a class="navbar-brand gold-text fw-bold" href="/produtos">🜃 LOTM System</a>
        <div class="ms-auto">
            <a href="/produtos" class="btn btn-outline-light btn-sm">Voltar</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card card-dark p-4">
                <h3 class="text-center gold-text mb-4">Cadastrar Usuário</h3>

                <!-- ERRO -->
                <div th:if="${erro}" class="alert alert-danger text-center">
                    <span th:text="${erro}"></span>
                </div>

                <form th:action="@{/usuarios/novo}" th:object="${usuario}" method="post">

                    <div class="mb-3">
                        <label class="form-label">Usuário</label>
                        <input type="text" class="form-control" th:field="*{username}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" class="form-control" th:field="*{password}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Tipo</label>
                        <select class="form-control" th:field="*{role}">
                            <option value="USER">Usuário</option>
                            <option value="ADMIN">Administrador</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/produtos" class="btn btn-outline-light">Cancelar</a>
                        <button type="submit" class="btn btn-gold">Salvar</button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
